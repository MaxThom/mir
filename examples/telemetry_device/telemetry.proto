syntax = "proto3";

package v1alpha.telemetry_example;

option go_package = "gen/";


import "../../pkgs/device/schema/v1alpha/mir.proto";

message EnvironmentTlm {
	option (mir.message_type) = TELEMETRY;

	int32 temperature = 1;
	int32 pressure = 2;
	int32 humidity = 3;
	int32 wind_speed = 4;
}

message PowerConsuption {
	double voltage = 1;
	double amp = 2;
	double power = 3;
}

message Gps {
	double latitude = 1;
	double longitude = 2;
	double altitude = 3;
}

message Constelletion {
	repeated Satellite satellites = 1;
}

message Satellite {
	string id = 1;
	int32 signal_strength = 2;
	Gps gps = 3;
}
