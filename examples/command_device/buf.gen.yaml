version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/maxthom/mir/examples/command_device/gen
plugins:
  - local: protoc-gen-go
    out: examples/command_device/gen
    opt: paths=source_relative
    include_imports: true
inputs:
  - directory: examples/command_device/proto
