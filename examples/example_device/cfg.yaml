mir:
  target: "nats://127.0.0.1:4222"
  logLevel: "debug"
  device:
    id: ""
    idPrefix:
      prefix: ""
      hostname: false
      username: false
    idGenerator:
      cpu: false
      disk: false
      mac: false
      machineId: false
      os: false
      hostname: false
      user: false
      salt: ""
      plain: false
    noSchemaOnBoot: true
  localStore:
    folderPath: ""
    inMemory: false
    retentionLimit: 160h
    diskSpaceLimit: 75
    persistenceType: "always"
user:
  sensors:
    - type: "temperature"
      unit: "C"
      interval: 10s
      pass: "123"
    - type: "humidity"
      unit: "%"
      interval: 10s
      pass: "456"
    - type: "pressure"
      unit: "Pa"
      interval: 10s
      pass: "789"
