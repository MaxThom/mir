syntax = "proto3";

package swarm.v1;
option go_package = "github.com/maxthom/mir/internal/ui/cli/gen/swarm/v1";

import "mir/device/v1/mir.proto";

message EnvironmentTlm {
	option (mir.device.v1.message_type) = MESSAGE_TYPE_TELEMETRY;
	option (mir.device.v1.meta) = {
		tags: [{
			key: "building",
			value: "A"
		}, {
			key: "floor",
			value: "1"
		}]
	};

	mir.device.v1.Timestamp ts = 1 [(mir.device.v1.timestamp) = TIMESTAMP_TYPE_FRACTION];
	int32 temperature = 2 [(mir.device.v1.field_meta) = { unit: "C" }];
	int32 pressure = 3 [(mir.device.v1.field_meta) = { unit: "kPA" }];
	int32 humidity = 4 [(mir.device.v1.field_meta) = { unit: "%" }];
	int32 wind_speed = 5 [(mir.device.v1.field_meta) = { unit: "km/h" }];
}

message PowerConsumption {
	option (mir.device.v1.message_type) = MESSAGE_TYPE_TELEMETRY;
	option (mir.device.v1.meta) = {
		tags: [{
			key: "building",
			value: "A"
		}, {
			key: "floor",
			value: "2"
		}]
	};

	int64 ts = 1 [(mir.device.v1.timestamp) = TIMESTAMP_TYPE_NANO];
	double voltage = 2 [(mir.device.v1.field_meta) = { unit: "V" }];
	double amp = 3 [(mir.device.v1.field_meta) = { unit: "A" }];
	double power = 4 [(mir.device.v1.field_meta) = { unit: "W" }];
}

message ActivateHVAC {
	option (mir.device.v1.message_type) = MESSAGE_TYPE_TELECOMMAND;

	int32 duration_sec = 1;
}

message ActivateHVACResponse {
  bool success = 1;
}

message DataRateProp {
  option (mir.device.v1.message_type) = MESSAGE_TYPE_TELECONFIG;

  int32 sec = 1;
}

message DataRateStatus {
  int32 sec = 1;
}

message HVACStatus {
   bool online = 1;
}
