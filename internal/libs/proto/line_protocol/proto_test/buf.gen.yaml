version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/maxthom/mir/internal/libs/proto/line_protocol/proto_test/gen
plugins:
  - local: protoc-gen-go
    out: internal/libs/proto/line_protocol/proto_test/gen
    opt: paths=source_relative
inputs:
  - directory: internal/libs/proto/line_protocol/proto_test
  - directory: pkgs/device/proto
