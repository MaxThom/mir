version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/maxthom/mir/internal/services/protocmd_srv/proto_test/gen
plugins:
  - local: protoc-gen-go
    out: internal/services/protocmd_srv/proto_test/gen
    opt: paths=source_relative
    include_imports: true
inputs:
  - directory: internal/services/protocmd_srv/proto_test
