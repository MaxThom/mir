syntax = "proto3";

package mir_api.v1;

import "mir_api/v1/common.proto";
import "mir_api/v1/core.proto";

// Send a command to a set of devices
// Data payload can be encoded in json or protobuf.
// Command Response will be in the same encoding as the request.
// There will always be validation if JSON encoding.
// - DryRun validate the command for each devices but do not send the command
// - NoValidation only work for protobuf encoding and will not ensure the command
// is properly encoded with the schema of the devices. Performance boost.
// - ForcePush will send the command to validated devices even if others are in errors
// - DryRun, NoValidation and Proto encoding together does nothing
// - NoValidation, Proto encoding and ForcePush is useless together. There will be no errors if
// NoValidation is on
message SendCommandRequest {
	DeviceTarget targets = 1; // To target a set of devices, search using ids, labels and annotations
	string name = 2; // name of the command
	bytes payload = 3; // payload of the command
	Encoding payload_encoding = 4; // Encoding type of payload
	bool refresh_schema = 5; // Force a schema refresh from the device, else will only try refresh if cant deserialize
	bool show_template = 6; // Show the json template of the command
	bool dry_run = 7; // Do not execute the command, just validate it
	bool no_validation = 8; // Do not validate the command (only for encoding protobuf)
	bool force_push = 9; // Send commands to validated devices even if some are in errors
	uint32 timeout_sec = 10; // Time to wait for response in second, default to 10
}

message SendCommandResponse {
    oneof response {
  	    CommandResponses ok = 1; // response of the command
        string error = 2;  // error if something went wrong
    }

    message CommandResponses {
        map<string, CommandResponse> device_responses = 1; // response per device
        Encoding encoding = 2; // encoding of the response
    }

    message CommandResponse {
        string device_id = 1; // device unique id
        string name = 2; // name of the command response
        bytes payload = 3; // actual response payload
        CommandResponseStatus status = 4; // status of command
        string error = 5; // HTTP like error if something went wrong
    }
}

enum CommandResponseStatus {
    COMMAND_RESPONSE_STATUS_UNSPECIFIED = 0; // Default, unspecified response status
    COMMAND_RESPONSE_STATUS_PENDING = 1; // Waiting to be sent and no validation required
    COMMAND_RESPONSE_STATUS_VALIDATED = 2; // Command was validated
    COMMAND_RESPONSE_STATUS_ERROR = 3; // Command execution failed
    COMMAND_RESPONSE_STATUS_SUCCESS = 4; // Command execution was successfull
}

message SendListCommandsRequest {
	DeviceTarget targets = 1; // To target a set of devices, search using ids, labels and annotations
	map<string, string> filter_labels = 2; // Filter commands by labels
	bool refresh_schema = 3; // Force a schema refresh from the device
}

message SendListCommandsResponse {
  oneof response {
  	DevicesCommands ok = 1; // all commands per devices
    string error = 2;  // error if something went wrong
  }
}

// Map of device id and its list of commands
message DevicesCommands {
	map<string, Commands> device_commands = 1; // all commands per devices
}

// List of commands
message Commands {
	repeated CommandDescriptor commands = 1; // Array of command descriptor
	string error = 2; // HTTP like error if something went wrong
}

// Descriptor of a command
message CommandDescriptor {
	string name = 1; // Name of command
	map<string, string> labels = 2; // Labels are used to tag a command
	string template = 3; // JSON payload boilerplate for an example
	string error = 4; // HTTP like error if something went wrong
}
