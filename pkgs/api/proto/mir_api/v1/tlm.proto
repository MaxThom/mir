syntax = "proto3";

package mir_api.v1;

import "mir_api/v1/common.proto";
import "mir_api/v1/core.proto";

message ListTelemetryRequest {
  DeviceTarget targets = 1; // To target a set of devices, search using ids, labels and annotations
  repeated string measurements = 2; // List of measurements to expand
  map<string, string> filters = 3; // Filter measurements by labels, if key has no value, expand to see all options
  bool refresh_schema = 4; // Force a schema refresh from the device
}

message ListTelemetryResponse {
  oneof response {
    TelemetryResponse ok = 1; // all telemetry per devices
    string error = 2; // error if something went wrong
  }
}

message QueryTelemetryRequest {
  DeviceTarget targets = 1; // To target a set of devices, search using ids, labels and annotations
  string measurement = 2; // Measurement to query
  repeated string fields = 3; // List of fields to query, if empty, query all fields
  Timestamp start_time = 4; // Start time of the query
  Timestamp end_time = 5; // End time of the query
  optional string aggregation_window = 6; // e.g. "10s", "1m", "5m", "1h" — empty means raw data
}

message QueryTelemetryResponse {
  oneof response {
    QueryTelemetry ok = 1; // all telemetry per devices
    string error = 2; // error if something went wrong
  }
}

message QueryTelemetry {
  repeated string headers = 1; // List of telemetry headers
  repeated string units = 2; // List of telemetry headers
  repeated DataType datatypes = 3; // List of telemetry data type
  repeated Row rows = 4; // List of telemetry data, order is the same as headers

  message Row {
    repeated DataPoint datapoints = 1; // List of telemetry data, order is the same as headers

    message DataPoint {
      // A plain int32 field with value 0 → 0 bytes (not encoded at all).
      // An optional int32 field with value 0 → 2 bytes (tag + varint 0 must be written to signal presence).
      // An optional int32 field that is absent → 0 bytes (same as plain field, nil is not encoded).
      // So the cost only applies when the value is explicitly set to its default (e.g., 0, false, ""). In all other cases, the wire size is identical to a
      // plain field.
      optional int32 value_int32 = 1;
      optional int64 value_int64 = 2;
      optional sint32 value_sint32 = 3;
      optional sint64 value_sint64 = 4;
      optional uint32 value_uint32 = 5;
      optional uint64 value_uint64 = 6;
      optional fixed32 value_fixed32 = 7;
      optional fixed64 value_fixed64 = 8;
      optional sfixed32 value_sfixed32 = 9;
      optional sfixed64 value_sfixed64 = 10;
      optional float value_float = 11;
      optional double value_double = 12;
      optional bool value_bool = 13;
      optional string value_string = 14;
      optional bytes value_bytes = 15;
      optional Timestamp value_timestamp = 16;
    }
  }
}

// In protobuf binary encoding, only set fields are written. Unset fields take zero bytes on the wire.
enum DataType {
  DATA_TYPE_UNSPECIFIED = 0;
  DATA_TYPE_INT32 = 1;
  DATA_TYPE_INT64 = 2;
  DATA_TYPE_SINT32 = 3;
  DATA_TYPE_SINT64 = 4;
  DATA_TYPE_UINT32 = 5;
  DATA_TYPE_UINT64 = 6;
  DATA_TYPE_FIXED32 = 7;
  DATA_TYPE_FIXED64 = 8;
  DATA_TYPE_SFIXED32 = 9;
  DATA_TYPE_SFIXED64 = 10;
  DATA_TYPE_FLOAT = 11;
  DATA_TYPE_DOUBLE = 12;
  DATA_TYPE_BOOL = 13;
  DATA_TYPE_STRING = 14;
  DATA_TYPE_BYTES = 15;
  DATA_TYPE_TIMESTAMP = 16;
}

// Map of device id and its list of telemetry
message TelemetryResponse {
  repeated DevicesTelemetry devices_telemetry = 1; // all telemetry with associated devices
}

// List of telemetry
message DevicesTelemetry {
  repeated DeviceIdPair ids = 1; // List of devices that have those telemetry
  repeated TelemetryDescriptor tlm_descriptors = 2; // Array of telemetry descriptor
  string error = 3; // List of devices with the same error if something went wrong
}

// Descriptor of a command
message TelemetryDescriptor {
  string name = 1; // Name of telemetry
  map<string, string> labels = 2; // Labels are used to tag a telemetry
  repeated string fields = 3; // Fields are all the data channel of a telemetry
  string explore_query = 4; // Grafana query to explore the telemetry
  string error = 5; // HTTP like error if something went wrong
}
