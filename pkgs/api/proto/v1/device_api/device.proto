syntax = "proto3";

package device_api.v1;

import "v1/common_api/common.proto";

/*
  Send a request to create a new device in the system
*/
message SchemaRetrieveRequest {
}

/*
  Response to the create device request
  Only the error or the response data will be set
*/
message SchemaRetrieveResponse {
  oneof response {
  	bytes schema = 1; // Schema in bytes
    common_api.v1.Error error = 2;  // HTTP like error if something went wrong
  }
}
