changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "fix"
        - "bugfix"
        - "bug"
    - title: "🏗️ Breaking Changes"
      labels:
        - "breaking-change"
    - title: "📦 Dependencies"
      labels:
        - "dependencies"
    - title: "📚 Documentation"
      labels:
        - "documentation"
    - title: "🧰 Maintenance"
      labels:
        - "maintenance"
        - "chore"
    - title: "⚡ Performance"
      labels:
        - "performance"
    - title: "🧪 Tests"
      labels:
        - "test"
        - "testing"
    - title: Other Changes
      labels:
        - "*"
