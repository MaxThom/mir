name: Build Mir Image

on:
  # push:
  #   tags:
  #     - 'v*'
  # release:
  #   types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maxthom/mir

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker tags
        id: tags
        run: |
          TAGS=""

          # For tags/releases, use the tag name
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG_NAME}"
            # Also tag as latest if it's a release
            if [[ "${{ github.event_name }}" == "release" ]]; then
              TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
          # For manual triggers, use branch-commitid
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            # Replace slashes with double underscores
            BRANCH_NAME=${BRANCH_NAME//\//__}
            SHORT_SHA=${GITHUB_SHA::7}
            TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_NAME}--${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Docker tags: ${TAGS}"

      - name: Get build info
        id: buildinfo
        run: |
          # Extract version from tag or use branch-commit
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            # Replace slashes with double underscores
            BRANCH_NAME=${BRANCH_NAME//\//__}
            SHORT_SHA=${GITHUB_SHA::7}
            VERSION="${BRANCH_NAME}-${SHORT_SHA}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          echo "user=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          echo "Time: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "User: ${{ github.actor }}"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VERSION=${{ steps.buildinfo.outputs.version }} \
            --build-arg USER=${{ steps.buildinfo.outputs.user }} \
            --build-arg TIME=${{ steps.buildinfo.outputs.time }} \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build \
            .
      - name: Tag Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build $tag
          done

      - name: Push Docker image
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker push $tag
          done

      - name: Image summary
        run: |
          echo "### Docker Image Published! 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.buildinfo.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Built by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build time:** ${{ steps.buildinfo.outputs.time }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images:**" >> $GITHUB_STEP_SUMMARY
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done
