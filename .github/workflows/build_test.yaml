name: Build Test

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  integration_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Install Web SDK dependencies
        run: npm install --prefix ./pkgs/web

      - name: Build Web SDK
        run: npm run build --prefix ./pkgs/web

      - name: Install Web UI dependencies
        run: npm install --prefix ./internal/ui/web

      - name: Build Web UI
        run: npm run build --prefix ./internal/ui/web

      - name: Build Mir Server
        run: go build -v ./...
