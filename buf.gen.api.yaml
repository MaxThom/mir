version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/maxthom/mir/pkgs/api/gen/proto
plugins:
  - local: protoc-gen-go
    out: pkgs/api/gen/proto
    opt: paths=source_relative
  - local: protoc-gen-es
    out: pkgs/web/src/gen/proto
    opt:
      - target=ts
      - import_extension=none
inputs:
  - directory: pkgs/api/proto
