# values-full.yaml
# Full deployment - Complete Mir stack with all infrastructure and monitoring
#
# This configuration includes:
# - Mir services with HA configuration
# - NATS with JetStream for messaging
# - SurrealDB for device metadata and events
# - InfluxDB for time-series telemetry data
# - Full Prometheus monitoring stack (Prometheus, Grafana, AlertManager)
# - Loki for log aggregation
# - Promtail for log collection
# - All dashboards and ServiceMonitors configured
#
# Usage:
# helm install mir ./mir -f values-full.yaml

# Mir image configuration
image:
  repository: ghcr.io/maxthom/mir
  pullPolicy: IfNotPresent
  tag: ""

## Use secret to pass any config as environment variables, mainly passwords and tokens.
## Refer to chart ./secret/mir.secret.yaml
## eg:
##   type: Opaque
##   stringData:
##     MIR__SURREAL__USER: "root"
##     MIR__SURREAL__PASSWORD: "root"
##     MIR__INFLUX__TOKEN: "mir-operator-token"
#secretRef: mir-secret
config:
  mir:
    # NATS URL - automatically configured
    url: ""  # Auto-configured
    logLevel: "info"
  surreal:
    # SurrealDB URL - automatically configured
    url: ""  # Auto-configured
    namespace: "global"
    database: "mir"
    user: "root"
    password: "root"  # Change in production, use secretRef
  influx:
    # InfluxDB URL - automatically configured
    url: ""  # Auto-configured
    token: "mir-operator-token"  # Change in production, use secretRef
    org: "Mir"
    bucket: "mir"
    batchSize: 1000
    flushInterval: 1000
    retryBufferLimit: 1073741824  # 1GB buffer
    gzip: true

# Production resource allocation
resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 512Mi
  # limits:
  #   cpu: 2000m
  #   memory: 2Gi

# Ingress configuration
ingress:
  enabled: false
  className: ""  # Change to your ingress controller
  annotations: {}
  hosts:
    - host: mir.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: mir-tls
      hosts:
        - mir.example.com

##
## Service Monitors, Dashboards and Rules pickup by Prometheus stack.
##
mirServiceMonitors:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirPrometheusRules:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

mirPromDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

#
# NATS Configuration
#
nats:
  enabled: true


  ## Configure Nats to a LoadBalancer
  ## Required for device outside the cluster
  ## Nats does not use http thus cannot use ingress
  # service:
  #   merge:
  #     spec:
  #       type: LoadBalancer
  #       ports:
  #         - appProtocol: tcp
  #           name: nats
  #           nodePort: 31422
  #           port: 4222
  #           protocol: TCP
  #           targetPort: nats

  ingress:
    enabled: false
    className: ""
    annotations:{}
    host: nats.example.com
    path: /
    pathType: Prefix
    tls:
      - secretName: nats-tls
        hosts:
          - nats.example.com

  # NATS cluster configuration
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 20Gi


  # NATS resources
  # container:
  #   env:
  #     GOMEMLIMIT: 8GiB  # ~80% of memory limit
  #   merge:
  #     resources:
  #       requests:
  #         cpu: 1000m
  #         memory: 10Gi
  #       limits:
  #         cpu: 1000m
  #         memory: 10Gi

  # Enable metrics for monitoring
  promExporter:
    enabled: true
    podMonitor:
      enabled: true
      merge:
        metadata:
          labels:
            prometheus: mir

#
# SurrealDB Configuration - Production setup
#
surrealdb:
  enabled: true
  surrealdb:
    path: "surrealkv:/data/mir.db"
    initial_user: "root"
    initial_pass: "root"  # Change in production
    log: info
  persistence:
    enabled: true
    size: 20Gi  # Production storage
    storageClassName: ""
  resources: {}
    # requests:
    #   cpu: 1000m
    #   memory: 8Gi
    # limits:
    #   cpu: 1000m
    #   memory: 8Gi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: surreal.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: surreal-tls
        hosts:
          - surreal.example.com
  ## Use secret to pass any config as environment variables, mainly passwords and tokens.
  ## Refer to chart ./secret/surreal.secret.yaml
  ## eg:
  ##   type: Opaque
  ##   stringData:
  ##     SURREAL_USER: "root"
  ##     SURREAL_PASS: "mir-operator-token"
  # podExtraEnv:
  #  - name: SURREAL_USER
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_USER
  #  - name: SURREAL_PASS
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_PASS

#
# InfluxDB Configuration - Production setup
#
influxdb2:
  enabled: true

  adminUser:
    organization: "Mir"
    bucket: "mir"
    user: "admin"
    retention_policy: "90d"  # 90 days retention
    password: "mir-operator"  # Change in production
    token: "mir-operator-token"  # Change in production
    ## If set, the password and token values above are ignored.
    ## Use secret to pass any config as environment variables, mainly passwords and tokens.
    ## Refer to chart ./secret/influx.secret.yaml
    ## eg:
    ##   type: Opaque
    ##   stringData:
    ##     admin-password: "mir-operator"
    ##     admin-token: "mir-operator-token"
    # existingSecret: influx-secret

  persistence:
    enabled: true
    size: 50Gi  # Production storage for telemetry
    storageClass: ""

  resources: {}
    # requests:
    #   cpu: 1000m
    #   memory: 8Gi
    # limits:
    #   cpu: 1000m
    #   memory: 8Gi

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hostname: influx.example.com
    path: /
    tls: true

#
# Kube-Prometheus-Stack - Full monitoring stack
#
kube-prometheus-stack:
  enabled: true

  # Prometheus configuration
  prometheus:
    prometheusSpec:
      retention: 30d  # 30 days retention
      retentionSize: 50GB
      resources: {}
        # requests:
        #   cpu: 1000m
        #   memory: 2Gi
        # limits:
        #   cpu: 4000m
        #   memory: 8Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: ""
            resources:
              requests:
                storage: 20Gi

    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - prometheus.example.com
      paths:
        - /
      pathType: Prefix
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.example.com

  # Grafana configuration
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: "mir-operator"  # Change in production

    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""

    ingress:
      enabled: true
      className: ""
      annotations: {}
      hosts:
        - grafana.example.com
      path: /
      pathType: Prefix
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.example.com

    resources: {}
      # requests:
      #   cpu: 250m
      #   memory: 512Mi
      # limits:
      #   cpu: 1000m
      #   memory: 1Gi

  # AlertManager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      retention: 720h  # 30 days
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: ""  # Use fast SSD storage
            resources:
              requests:
                storage: 10Gi
      resources: {}
        # requests:
        #   cpu: 100m
        #   memory: 128Mi
        # limits:
        #   cpu: 500m
        #   memory: 512Mi

    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - alertmanager.example.com
      paths:
        - /
      pathType: Prefix
      tls:
        - secretName: alertmanager-tls
          hosts:
            - alertmanager.example.com

    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: 'null'
        routes:
          - match:
              alertname: Watchdog
            receiver: 'null'
          - match_re:
              severity: critical
            receiver: 'mir-critical'
            continue: true
          - match_re:
              severity: warning
            receiver: 'mir-warning'
      receivers:
        - name: 'null'
        - name: 'mir-critical'
          # Configure critical alert receivers (PagerDuty, etc.)
          # pagerduty_configs:
          #   - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        - name: 'mir-warning'
          # Configure warning alert receivers (Slack, Email, etc.)
          # slack_configs:
          #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
          #     channel: '#mir-alerts'
          #     title: 'Mir Warning Alert'

  # Node Exporter
  nodeExporter:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 64Mi
      # limits:
      #   cpu: 500m
      #   memory: 256Mi

  # Kube State Metrics
  kubeStateMetrics:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      # limits:
      #   cpu: 500m
      #   memory: 512Mi

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 200m
      #   memory: 256Mi
      # limits:
      #   cpu: 1000m
      #   memory: 1Gi

#
# Loki - Log aggregation system
#
loki:
  enabled: true

  # Production deployment mode
  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources: {}
      # requests:
      #   cpu: 500m
      #   memory: 1Gi
      # limits:
      #   cpu: 2000m
      #   memory: 4Gi
    persistence:
      enabled: true
      size: 10Gi  # Production storage
      storageClass: ""

  # Loki configuration
  loki:
    limits_config:
      retention_period: 720h  # 30 days retention

  # Gateway
  gateway:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      # limits:
      #   cpu: 500m
      #   memory: 512Mi

  # Ingress
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: loki.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: loki-tls
        hosts:
          - loki.example.com

#
# Promtail - Log collector
#
promtail:
  enabled: true
  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
