{{- if .Values.mirDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mir.fullname" . }}-grafana-dashboards-mir
  labels:
    {{- include "mir.labels" . | nindent 4 }}
    {{- with .Values.mirDashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    grafana_folder: "Mir"
    {{- with .Values.mirDashboards.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  mir.json: |
{{ .Files.Get "dashboards/mir/mir.json" | indent 4 }}
{{- end }}
