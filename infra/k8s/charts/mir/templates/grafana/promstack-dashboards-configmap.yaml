{{- if .Values.mirPromDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mir.fullname" . }}-grafana-dashboards-promstack
  labels:
    {{- include "mir.labels" . | nindent 4 }}
    {{- with .Values.mirPromDashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    grafana_folder: "Mir PromStack"
    {{- with .Values.mirPromDashboards.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  promtail.json: |
{{ .Files.Get "dashboards/promstack/promtail.json" | indent 4 }}
  prometheus.json: |
{{ .Files.Get "dashboards/promstack/prometheus.json" | indent 4 }}
  node-exporter.json: |
{{ .Files.Get "dashboards/promstack/node-exporter.json" | indent 4 }}
  loki.json: |
{{ .Files.Get "dashboards/promstack/loki.json" | indent 4 }}
  grafana.json: |
{{ .Files.Get "dashboards/promstack/grafana.json" | indent 4 }}
  alertmanager.json: |
{{ .Files.Get "dashboards/promstack/alertmanager.json" | indent 4 }}
{{- end }}
