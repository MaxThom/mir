{{- if and .Values.surrealdb.enabled .Values.surrealdb.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mir.fullname" . }}-surrealdb
  labels:
    {{- include "mir.labels" . | nindent 4 }}
    app.kubernetes.io/component: surrealdb
  {{- with .Values.surrealdb.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.surrealdb.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.surrealdb.ingress.tls }}
  tls:
    {{- range .Values.surrealdb.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.surrealdb.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.surrealdb.ingress.path | default "/" }}
            pathType: {{ .Values.surrealdb.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "mir.fullname" . }}-surrealdb
                port:
                  number: 8000
{{- end }}