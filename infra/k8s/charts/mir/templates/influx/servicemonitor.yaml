{{- if .Values.mirServiceMonitors.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mir.fullname" . }}-influxdb2
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mir.labels" . | nindent 4 }}
    {{- with .Values.mirServiceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    app.kubernetes.io/component: metrics
  annotations:
    {{- with .Values.mirServiceMonitors.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb2
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
{{- end }}
