apiVersion: v2
name: mir
description: A Helm chart for Mir IoT Platform for Kubernetes
type: application

version: 0.3.0
appVersion: "v0.4.2"

dependencies:
  - name: nats
    version: "2.12.4"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  - name: surrealdb
    version: "0.4.0"
    repository: https://helm.surrealdb.com
    condition: surrealdb.enabled
  - name: influxdb2
    # Influx chart is stalled as it is done
    # Update image of influx in values.yaml
    version: "2.1.2"
    repository: https://helm.influxdata.com/
    condition: influxdb2.enabled
  - name: kube-prometheus-stack
    version: "82.5.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled
  - name: loki
    # Look like the repo for loki is being moved at some point
    # https://github.com/grafana/loki/issues/20705
    version: "6.53.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: promtail
    version: "6.17.1"
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
