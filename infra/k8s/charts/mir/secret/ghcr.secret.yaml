# GitHub Container Registry Secret
#
# To use this secret:
# 1. Create a GitHub Personal Access Token (PAT) with 'read:packages' scope
#    - Go to: https://github.com/settings/tokens/new
#    - Select scope: read:packages (for pulling images)
#    - If pushing images, also select: write:packages, delete:packages
#
# 2. Create the secret in your cluster:
#    kubectl create secret docker-registry ghcr-secret \
#      --docker-server=ghcr.io \
#      --docker-username=YOUR_GITHUB_USERNAME \
#      --docker-password=YOUR_GITHUB_PAT \
#      --docker-email=YOUR_EMAIL \
#      -n mir-prod
#
# 3. Reference in your Helm values:
#    imagePullSecrets:
#      - name: ghcr-secret
#
# Example YAML format:
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: mir-prod
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "YOUR_GITHUB_USERNAME",
          "password": "YOUR_GITHUB_PAT",
          "email": "YOUR_EMAIL",
        }
      }
    }
