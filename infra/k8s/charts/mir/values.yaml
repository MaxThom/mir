image:
  repository: ghcr.io/maxthom/mir
  pullPolicy: IfNotPresent
  tag: ""

## Use secret to pass any config as environment variables, mainly passwords and tokens.
## Refer to chart ./secret/mir.secret.yaml
## eg:
##   type: Opaque
##   stringData:
##     MIR__SURREAL__USER: "root"
##     MIR__SURREAL__PASSWORD: "root"
##     MIR__INFLUX__TOKEN: "mir-operator-token"
#secretRef: mir-secret
config:
  mir:
    # NATS URL - automatically set with release name when empty
    url: "" # nats://localhost:4222/
    logLevel: "info"
  surreal:
    # SURREAL URL - automatically set with release name when empty
    url: "" # ws://localhost:8000/
    namespace: "global"
    database: "mir"
    user: "root"
    password: "root"
  influx:
    # INFLUX URL - automatically set with release name when empty
    url: "" # http://localhost:8086/
    token: "mir-operator-token"
    org: "Mir"
    bucket: "mir"
    batchSize: 1000
    flushInterval: 1000
    retryBufferLimit: 1073741824 # one week
    gzip: false

## Pass extra environment variables
# Each config can be overwritten using env. vars.
# MIR__ for prefix, __ for nesting
# eg: MIR__MIR__URL for config.mir.url
# eg: MIR__SURREAL__PASSWORD for config.surreal.password
envVars: []
# - name: key
#   value: value

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mir-local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - mir-local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

#
# NATS subchart configuration
#
nats:
  enabled: true
  ## Configure Nats to a LoadBalancer
  service:
    merge:
      spec:
        type: LoadBalancer
        ports:
          - appProtocol: tcp
            name: nats
            nodePort: 31422
            port: 4222
            protocol: TCP
            targetPort: nats
  ingress:
    enabled: false
    className: ""  # "[nginx|traefik]"
    annotations: {}
    host: nats-local
    path: /
    pathType: Prefix
    tls: []
    #  - secretName: nats-tls
    #    hosts:
    #      - nats-local
  config:
    merge:
      max_payload: << 8MB >>
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi
  podTemplate:
    topologySpreadConstraints:
      kubernetes.io/hostname:
        maxSkew: 1
        whenUnsatisfiable: DoNotSchedule
  ## Resources
  # container:
  #   env:
  #     # Different from k8s units, suffix must be B, KiB, MiB, GiB, or TiB
  #     # Should be ~80% of memory limit
  #     GOMEMLIMIT: 6GiB
  #   merge:
  #     # Recommended minimum: at least 2 CPU cores and 8Gi memory for production JetStream clusters
  #     # Set same limit as request to ensure Guaranteed QoS
  #     resources: {}
  promExporter:
    enabled: true
    podMonitor:
      enabled: true
      merge:
        metadata:
          labels:
            prometheus: mir

#
# SurrealDB subchart configuration
#
surrealdb:
  enabled: true
  surrealdb:
    path: "surrealkv:/data/mir.db"  # File-based storage
    initial_user: "root"
    initial_pass: "root"
    log: info
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  podSecurityContext:
    podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
      # - host: surreal-local
      #   paths:
      #     - path: /*
      #       pathType: Prefix
    tls: []
  ## Use secret to pass any config as environment variables, mainly passwords and tokens.
  ## Refer to chart ./secret/surreal.secret.yaml
  ## eg:
  ##   type: Opaque
  ##   stringData:
  ##     SURREAL_USER: "root"
  ##     SURREAL_PASS: "mir-operator-token"
  # podExtraEnv:
  #  - name: SURREAL_USER
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_USER
  #  - name: SURREAL_PASS
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_PASS

#
# InfluxDB2 subchart configuration
#
influxdb2:
  enabled: true
  image:
    tag: "2.8.0"
  adminUser:
    organization: "Mir"
    bucket: "mir"
    user: "admin"
    retention_policy: "0s"  # Infinite retention
    password: "mir-operator"
    token: "mir-operator-token"
    ## If set, the password and token values above are ignored.
    ## Use secret to pass any config as environment variables, mainly passwords and tokens.
    ## Refer to chart ./secret/influx.secret.yaml
    ## eg:
    ##   type: Opaque
    ##   stringData:
    ##     admin-password: "mir-operator"
    ##     admin-token: "mir-operator-token"
    # existingSecret: influx-secret
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Use default storage class
  service:
    type: ClusterIP
    port: 8086
  resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hostname: influx-local
    path: /
    tls: false

#
# Mir Server Extra Config
#

enabled: true
replicaCount: 1
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP # [ClusterIP|NodePort|LoadBalancer]
  port: 80 # Externally exposed ports
  targetPort: 3015 # Internal port Mir binds to
  nodePort: 30015 # Fixed NodePort (30000-32767), comment out for random assignment

livenessProbe:
  httpGet:
    path: /alive
    port: http
readinessProbe:
  httpGet:
    path: /ready
    port: http

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}

##
## Service Monitors, Dashboards and Rules pickup by Prometheus stack.
##
mirServiceMonitors:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirPrometheusRules:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

# Set of extra dashboards for promstack monitoring
mirPromDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

# Kube-Prometheus-Stack subchart configuration
kube-prometheus-stack:
  enabled: false  # Set to true to enable Prometheus monitoring stack

  commonLabels:
    prometheus: mir

  prometheus:
    prometheusSpec:
      retention: 7d
      retentionSize: 10GB
      # Allow prometheus to discover all ServiceMonitors and PodMonitors
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          prometheus: mir
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector:
        matchLabels:
          prometheus: mir
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          prometheus: mir
      resources: {}
        # requests:
        #   cpu: 250m
        #   memory: 400Mi
        # limits:
        #   cpu: 1000m
        #   memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      # Additional scrape configs for Mir services
      additionalScrapeConfigs: []
      additionalServiceMonitors: []
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - prometheus-local
      paths: []
        # - /
      tls: []

  # Grafana configuration
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: "mir-operator"  # Change this in production
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: 'browser' #utc
    # Place all default kube-prometheus-stack dashboards in Kubernetes folder
    defaultDashboardsFolder: Kubernetes
    sidecar:
      datasources:
        alertmanager:
          handleGrafanaManagedAlerts: true
      dashboards:
        enabled: true
        label: grafana
        labelValue: mir
        folder: /tmp/dashboards
        folderAnnotation: grafana_folder
        searchNamespace: ALL
        provider:
          foldersFromFilesStructure: true
        annotations:
          grafana_folder: Kubernetes
    persistence:
      enabled: true
      size: 1Gi
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - grafana-local
      path: /
      tls: []
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      # limits:
      #   cpu: 500m
      #   memory: 512Mi
    serviceMonitor:
      enabled: true
      labels:
        prometheus: mir

    # Grafana ini configuration
    grafana.ini:
      #server:
        #root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
        #serve_from_sub_path: false
      auth.anonymous:
        enabled: false
        org_role: Viewer
      users:
        viewers_can_edit: true
      auth:
        disable_login_form: false
        disable_signout_menu: false
      auth.anonymous:
        enabled: false
        org_role: Viewer
      snapshots:
        external_enabled: false

    # Add Influx and Surreal as additional datasources
    additionalDataSources:
      # - name: alertmanager
      #   type: alertmanager
      #   uid: mir-alertmanager
      #   typeName: Alertmanager
      #   typeLogoUrl: public/app/plugins/datasource/alertmanager/img/logo.svg
      #   access: proxy
      #   url: "http://{{ .Release.Name }}-alertmanager:9093"
      #   basicAuth: false
      #   isDefault: false
      #   jsonData:
      #     handleGrafanaManagedAlerts: true
      #     implementation: prometheus
      #   readOnly: true
      - name: InfluxDB
        type: influxdb
        uid: mir-influxdb
        access: proxy
        url: "http://{{ .Release.Name }}-influxdb2:8086"
        isDefault: false
        typeName: InfluxDB
        typeLogoUrl: public/app/plugins/datasource/influxdb/img/influxdb_logo.svg
        access: proxy
        user: ""
        database: ""
        basicAuth: false
        isDefault: false
        readOnly: true
        jsonData:
          organization: Mir
          defaultBucket: mir
          httpMode: POST
          timeout: -5
          version: Flux
          tlsSkipVerify: true
        secureJsonData:
          token: "mir-operator-token"  # Should match influxdb2.adminUser.token
      - name: Loki
        type: loki
        uid: mir-loki
        access: proxy
        url: "http://{{ .Release.Name }}-loki-gateway"
        isDefault: false
        typeName: Loki
        typeLogoUrl: public/app/plugins/datasource/loki/img/loki_icon.svg
        basicAuth: false
        readOnly: true
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceName: Tempo
              datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: "$${__value.raw}"
              urlDisplayLabel: "View Trace"

    # Import custom dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'mir-dashboards'
            orgId: 1
            folder: 'Mir'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/mir
          - name: 'mir-infra-dashboards'
            orgId: 1
            folder: 'Mir Infra'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/infra
          - name: 'mir-promstack-dashboards'
            orgId: 1
            folder: 'Mir PromStack'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/promstack

    #dashboardsConfigMaps: []
      # mir-dashboards: "mir-grafana-dashboards-mir"
      # mir-infra-dashboards: "mir-grafana-dashboards-infra"

    # Install additional plugins
    plugins:
      - grafana-piechart-panel
      - grafana-worldmap-panel

  # AlertManager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      retention: 120h
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      resources: {}
        # requests:
        #   cpu: 50m
        #   memory: 64Mi
        # limits:
        #   cpu: 200m
        #   memory: 256Mi
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - alertmanager-local
      paths: []
        # - /
      tls: []
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: 'null'
        routes:
          - match:
              alertname: Watchdog
            receiver: 'null'
          - match_re:
              severity: critical|warning
            receiver: 'mir-alerts'
      receivers:
        - name: 'null'
        - name: 'mir-alerts'
          # Configure your alert receivers here (email, slack, etc.)
          # email_configs:
          #   - to: 'team@example.com'
          #     from: 'alertmanager@example.com'
          #     smarthost: 'smtp.example.com:587'
          #     auth_username: 'alertmanager@example.com'
          #     auth_password: 'password'
          # slack_configs:
          #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
          #     channel: '#alerts'
          #     title: 'Mir Alert'

  # Node Exporter for host metrics
  nodeExporter:
    enabled: true
    resources: {}
    #   requests:
    #     cpu: 50m
    #     memory: 30Mi
    #   limits:
    #     cpu: 200m
    #     memory: 100Mi

  prometheus-node-exporter:
    prometheus:
      monitor:
        additionalLabels:
          prometheus: mir

  # Kube State Metrics for Kubernetes metrics
  kubeStateMetrics:
    enabled: true
    prometheus:
      monitor:
        additionalLabels:
          prometheus: mir
    resources: {}
      # requests:
      #   cpu: 50m
      #   memory: 64Mi
      # limits:
      #   cpu: 200m
      #   memory: 256Mi

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
      # limits:
      #   cpu: 500m
      #   memory: 512Mi

  # Default Prometheus rules
  defaultRules:
    create: true
    labels:
      prometheus: mir
    additionalRuleLabels:
      prometheus: mir

#
# Loki subchart configuration
#
loki:
  enabled: false  # Set to true to enable Loki log aggregation

  # Deployment mode
  deploymentMode: SingleBinary

  # Single binary config for monolithic deployment
  singleBinary:
    replicas: 1
    resources: {}
      # requests:
      #   cpu: 100m
      #   memory: 256Mi
      # limits:
      #   cpu: 500m
      #   memory: 1Gi
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""  # Use default storage class

  # Loki configuration
  loki:
    ui:
      enabled: true
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    limits_config:
      retention_period: 168h  # 7 days retention to match Prometheus
      max_entries_limit_per_query: 5000
      max_query_parallelism: 4
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

  # Gateway configuration
  gateway:
    enabled: true
    resources: {}
      # requests:
      #   cpu: 50m
      #   memory: 64Mi
      # limits:
      #   cpu: 200m
      #   memory: 256Mi

  # Monitoring
  monitoring:
    dashboards:
      enabled: false
      labels:
        grafana: mir
      annotations:
        grafana_folder: "Mir Infra"
    rules:
      enabled: true
      labels:
        prometheus: mir
    serviceMonitor:
      enabled: true
      labels:
        prometheus: mir
      interval: 30s
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false

  # Test configuration
  test:
    enabled: false

  # Backend components (disabled for SingleBinary mode)
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  # Ingress configuration
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
      # - host: loki-local
      #   paths:
      #     - path: /
      #       pathType: Prefix
    tls: []

#
# Promtail subchart configuration
#
promtail:
  enabled: false  # Set to true to enable Promtail log collection

  # Deployment configuration
  daemonset:
    enabled: true

  resources: {}
    # requests:
    #   cpu: 50m
    #   memory: 64Mi
    # limits:
    #   cpu: 200m
    #   memory: 128Mi

  # Configure Promtail to send logs to Loki
  config:
    clients:
      - url: http://{{ .Release.Name }}-loki-gateway/loki/api/v1/push

    snippets:
      pipelineStages:
        - cri: {}
        - labeldrop:
            - filename
            - stream

      # Additional scrape configs
      scrapeConfigs: |
        # Scrape config for all pods
        - job_name: kubernetes-pods
          pipeline_stages:
            - cri: {}
            - labeldrop:
                - filename
                - stream
            - json:
                expressions:
                  level: level
                  device_id: device_id
                  cmd: cmd
                  srv: srv
                  sub: sub
                  time: time
            - timestamp:
                source: time
                format: Unix
            - static_labels:
                system: mir
            - labels:
                __tmp_controller_name:
                level:
                job:
                service_id:
                service_name:
                device_id:
                cmd:
                srv:
                sub:

          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels:
                - __meta_kubernetes_pod_controller_name
              regex: ([0-9a-z-.]+?)(-[0-9a-f]{4,10})?
              action: replace
              target_label: __tmp_controller_name
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
                - __meta_kubernetes_pod_label_app
                - __tmp_controller_name
                - __meta_kubernetes_pod_name
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: app
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_instance
                - __meta_kubernetes_pod_label_instance
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: instance
            - source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_component
                - __meta_kubernetes_pod_label_component
              regex: ^;*([^;]+)(;.*)?$
              action: replace
              target_label: component
            - action: replace
              source_labels:
                - __meta_kubernetes_pod_node_name
              target_label: node_name
            - action: replace
              source_labels:
                - __meta_kubernetes_namespace
              target_label: namespace
            - action: replace
              source_labels:
                - __meta_kubernetes_pod_name
              target_label: pod
            - action: replace
              source_labels:
                - __meta_kubernetes_pod_container_name
              target_label: container
            - replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              target_label: __path__
            - action: replace
              regex: (.*)
              source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
              target_label: app_kubernetes_io_name
            - action: replace
              regex: (.*)
              source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_instance
              target_label: app_kubernetes_io_instance
            - action: replace
              regex: (.*)
              source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_component
              target_label: app_kubernetes_io_component
            - action: replace
              source_labels:
                - __meta_kubernetes_pod_label_app_kubernetes_io_instance
                - __meta_kubernetes_pod_label_app_kubernetes_io_name
              separator: "-"
              regex: ^(.+)-(.+)$
              replacement: ${1}-${2}
              target_label: job
            - source_labels: [__tmp_controller_name]
              regex: ^(.+)$
              target_label: job

  # Service Monitor for Prometheus
  serviceMonitor:
    enabled: true
    labels:
      prometheus: mir
    interval: 30s

  # Tolerations to run on all nodes
  tolerations:
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  # Volume mounts for log collection
  volumeMounts:
    - name: containers
      mountPath: /var/log/pods
      readOnly: true
    - name: docker
      mountPath: /var/lib/docker/containers
      readOnly: true

  volumes:
    - name: containers
      hostPath:
        path: /var/log/pods
    - name: docker
      hostPath:
        path: /var/lib/docker/containers
