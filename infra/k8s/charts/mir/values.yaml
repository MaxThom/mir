image:
  repository: ghcr.io/maxthom/mir
  pullPolicy: IfNotPresent
  tag: ""

## Use secret to pass any config as environment variables, mainly passwords and tokens.
## Refer to chart ./secret/mir.secret.yaml
## eg:
##   type: Opaque
##   stringData:
##     MIR__SURREAL__USER: "root"
##     MIR__SURREAL__PASSWORD: "root"
##     MIR__INFLUX__TOKEN: "mir-operator-token"
#secretRef: mir-secret
config:
  mir:
    # NATS URL - automatically set when nats.enabled=true, otherwise use this value
    url: "nats://external-nats:4222/"
    logLevel: "info"
  surreal:
    # SURREAL URL - automatically set when surreal.enabled=true otherwise use this value
    url: "ws://localhost:8000/"
    namespace: "global"
    database: "mir"
    user: "root"
    password: "root"
  influx:
    # INFLUX URL - automatically set when influx.enabled=true otherwise use this value
    url: "http://localhost:8086/"
    token: "mir-operator-token"
    org: "Mir"
    bucket: "mir"
    batchSize: 1000
    flushInterval: 1000
    retryBufferLimit: 1073741824 # one week
    gzip: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mir-local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - mir-local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

#
# NATS subchart configuration
#
nats:
  enabled: true
  ## Configure Nats to a LoadBalancer
  # service:
  #   merge:
  #     spec:
  #       type: LoadBalancer
  #       ports:
  #         - appProtocol: tcp
  #           name: nats
  #           nodePort: 31422
  #           port: 4222
  #           protocol: TCP
  #           targetPort: nats
  ingress:
    enabled: false
    className: ""  # "[nginx|traefik]"
    annotations: {}
    host: nats-local
    path: /
    pathType: Prefix
    tls: []
    #  - secretName: nats-tls
    #    hosts:
    #      - nats-local
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi
  podTemplate:
    topologySpreadConstraints:
      kubernetes.io/hostname:
        maxSkew: 1
        whenUnsatisfiable: DoNotSchedule
  ## Resources
  # container:
  #   env:
  #     # Different from k8s units, suffix must be B, KiB, MiB, GiB, or TiB
  #     # Should be ~80% of memory limit
  #     GOMEMLIMIT: 6GiB
  #   merge:
  #     # Recommended minimum: at least 2 CPU cores and 8Gi memory for production JetStream clusters
  #     # Set same limit as request to ensure Guaranteed QoS
  #     resources: {}
  promExporter:
    enabled: true
    podMonitor:
      enabled: true
      merge:
        metadata:
          labels:
            prometheus: mir

#
# SurrealDB subchart configuration
#
surrealdb:
  enabled: true
  image:
    tag: "v2.3.7"
  surrealdb:
    path: "surrealkv:/data/mir.db"  # File-based storage
    initial_user: "root"
    initial_pass: "root"
    log: info
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
      # - host: surreal-local
      #   paths:
      #     - path: /*
      #       pathType: Prefix
    tls: []
  ## Use secret to pass any config as environment variables, mainly passwords and tokens.
  ## Refer to chart ./secret/surreal.secret.yaml
  ## eg:
  ##   type: Opaque
  ##   stringData:
  ##     SURREAL_USER: "root"
  ##     SURREAL_PASS: "mir-operator-token"
  # podExtraEnv:
  #  - name: SURREAL_USER
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_USER
  #  - name: SURREAL_PASS
  #    valueFrom:
  #      secretKeyRef:
  #        name: surreal-secret
  #        key: SURREAL_PASS

#
# InfluxDB2 subchart configuration
#
influxdb2:
  enabled: true
  image:
    tag: "2.7.4"
  adminUser:
    organization: "Mir"
    bucket: "mir"
    user: "admin"
    retention_policy: "0s"  # Infinite retention
    password: "mir-operator"
    token: "mir-operator-token"
    ## If set, the password and token values above are ignored.
    ## Use secret to pass any config as environment variables, mainly passwords and tokens.
    ## Refer to chart ./secret/influx.secret.yaml
    ## eg:
    ##   type: Opaque
    ##   stringData:
    ##     admin-password: "mir-operator"
    ##     admin-token: "mir-operator-token"
    # existingSecret: influx-secret
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Use default storage class
  service:
    type: ClusterIP
    port: 8086
  resources: {}
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hostname: influx-local
    path: /
    tls: false

#
# Mir Server Extra Config
#

enabled: true
replicaCount: 1
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP # [ClusterIP|NodePort|LoadBalancer]
  port: 80 # Externally exposed ports
  targetPort: 3015 # Internal port Mir binds to
  nodePort: 30015 # Fixed NodePort (30000-32767), comment out for random assignment

livenessProbe:
  httpGet:
    path: /alive
    port: http
readinessProbe:
  httpGet:
    path: /ready
    port: http

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}


mirServiceMonitors:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirPrometheusRules:
  enabled: true
  labels:
    prometheus: mir
  annotations: {}

mirDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

# Set of extra dashboards for promstack monitoring
mirPromDashboards:
  enabled: true
  labels:
    grafana: mir
  annotations: {}

# Kube-Prometheus-Stack subchart configuration
kube-prometheus-stack:
  enabled: false  # Set to true to enable Prometheus monitoring stack

  commonLabels:
    prometheus: mir

  prometheus:
    prometheusSpec:
      retention: 7d
      retentionSize: 10GB
      # Allow prometheus to discover all ServiceMonitors and PodMonitors
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          prometheus: mir
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector:
        matchLabels:
          prometheus: mir
      ruleSelectorNilUsesHelmValues: false
      ruleSelector:
        matchLabels:
          prometheus: mir
      resources:
        requests:
          cpu: 250m
          memory: 400Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      # Additional scrape configs for Mir services
      additionalScrapeConfigs: []
      additionalServiceMonitors: []
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - prometheus-local
      paths: []
        # - /
      tls: []

  # Grafana configuration
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: "mir-operator"  # Change this in production
    defaultDashboardsEnabled: true
    defaultDashboardsTimezone: 'browser' #utc
    # Place all default kube-prometheus-stack dashboards in Kubernetes folder
    defaultDashboardsFolder: Kubernetes
    sidecar:
      dashboards:
        enabled: true
        label: grafana
        labelValue: mir
        folder: /tmp/dashboards
        folderAnnotation: grafana_folder
        searchNamespace: ALL
        provider:
          foldersFromFilesStructure: true
        annotations:
          grafana_folder: Kubernetes
    persistence:
      enabled: true
      size: 1Gi
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - grafana-local
      path: /
      tls: []
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceMonitor:
      enabled: true
      labels:
        prometheus: mir

    # Grafana ini configuration
    grafana.ini:
      #server:
        #root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
        #serve_from_sub_path: false
      auth.anonymous:
        enabled: false
        org_role: Viewer
      users:
        viewers_can_edit: true
      auth:
        disable_login_form: false
        disable_signout_menu: false
      auth.anonymous:
        enabled: false
        org_role: Viewer
      snapshots:
        external_enabled: false

    # Add Influx and Surreal as additional datasources
    additionalDataSources:
      # - name: alertmanager
      #   type: alertmanager
      #   uid: mir-alertmanager
      #   typeName: Alertmanager
      #   typeLogoUrl: public/app/plugins/datasource/alertmanager/img/logo.svg
      #   access: proxy
      #   url: "http://{{ .Release.Name }}-alertmanager:9093"
      #   basicAuth: false
      #   isDefault: false
      #   jsonData:
      #     handleGrafanaManagedAlerts: true
      #     implementation: prometheus
      #   readOnly: true
      - name: InfluxDB
        type: influxdb
        uid: mir-influxdb
        access: proxy
        url: "http://{{ .Release.Name }}-influxdb2:8086"
        isDefault: false
        typeName: InfluxDB
        typeLogoUrl: public/app/plugins/datasource/influxdb/img/influxdb_logo.svg
        access: proxy
        user: ""
        database: ""
        basicAuth: false
        isDefault: false
        readOnly: true
        jsonData:
          organization: Mir
          defaultBucket: mir
          httpMode: POST
          timeout: -5
          version: Flux
          tlsSkipVerify: true
        secureJsonData:
          token: "mir-operator-token"  # Should match influxdb2.adminUser.token

    # Import custom dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'mir-dashboards'
            orgId: 1
            folder: 'Mir'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/mir
          - name: 'mir-infra-dashboards'
            orgId: 1
            folder: 'Mir Infra'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/infra
          - name: 'mir-promstack-dashboards'
            orgId: 1
            folder: 'Mir PromStack'
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            allowUiUpdates: false
            options:
              path: /var/lib/grafana/dashboards/promstack

    #dashboardsConfigMaps: []
      # mir-dashboards: "mir-grafana-dashboards-mir"
      # mir-infra-dashboards: "mir-grafana-dashboards-infra"

    # Install additional plugins
    plugins:
      - grafana-piechart-panel
      - grafana-worldmap-panel

  # AlertManager configuration
  alertmanager:
    enabled: true
    alertmanagerSpec:
      retention: 120h
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
        # - alertmanager-local
      paths: []
        # - /
      tls: []
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: 'null'
        routes:
          - match:
              alertname: Watchdog
            receiver: 'null'
          - match_re:
              severity: critical|warning
            receiver: 'mir-alerts'
      receivers:
        - name: 'null'
        - name: 'mir-alerts'
          # Configure your alert receivers here (email, slack, etc.)
          # email_configs:
          #   - to: 'team@example.com'
          #     from: 'alertmanager@example.com'
          #     smarthost: 'smtp.example.com:587'
          #     auth_username: 'alertmanager@example.com'
          #     auth_password: 'password'
          # slack_configs:
          #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
          #     channel: '#alerts'
          #     title: 'Mir Alert'

  # Node Exporter for host metrics
  nodeExporter:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 30Mi
      limits:
        cpu: 200m
        memory: 100Mi

  prometheus-node-exporter:
    prometheus:
      monitor:
        additionalLabels:
          prometheus: mir

  # Kube State Metrics for Kubernetes metrics
  kubeStateMetrics:
    enabled: true
    prometheus:
      monitor:
        additionalLabels:
          prometheus: mir
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Default Prometheus rules
  defaultRules:
    create: true
    labels:
      prometheus: mir
    additionalRuleLabels:
      prometheus: mir
