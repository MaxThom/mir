replicaCount: 1

image:
  repository: ghcr.io/maxthom/mir
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP # [ClusterIP|NodePort|LoadBalancer]
  port: 80 # Externally exposed ports
  targetPort: 3015 # Internal port Mir binds to
  nodePort: 30015 # Fixed NodePort (30000-32767), comment out for random assignment

# Use secret to pass any config as environment variables, mainly passwords and tokens.
# Refer to chart ./secret/secret.yaml
# eg:
#   type: Opaque
#   stringData:
#     MIR__SURREAL__PASSWORD: "root"
#     MIR__INFLUX__TOKEN: "mir-operator-token"
secretRef: ""
config:
  mir:
    # NATS URL - automatically set when nats.enabled=true, otherwise use this value
    url: "nats://external-nats:4222"  # Used only when nats.enabled=false
    logLevel: "info"
  surreal:
    url: "ws://localhost:8000/rpc"
    namespace: "global"
    database: "mir"
    user: "root"
    password: "root"
  influx:
    url: "http://localhost:8086/"
    token: "mir-operator-token"
    org: "Mir"
    bucket: "mir"
    batchSize: 1000
    flushInterval: 1000
    retryBufferLimit: 1073741824
    gzip: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mir-local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - mir-local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /alive
    port: http
readinessProbe:
  httpGet:
    path: /ready
    port: http

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}

# NATS subchart configuration
nats:
  enabled: true
  ingress:
    enabled: false
    className: ""  # "[nginx|traefik]"
    annotations: {}
    host: nats-local
    path: /
    pathType: Prefix
    tls: []
    #  - secretName: nats-tls
    #    hosts:
    #      - nats-local
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        pvc:
          size: 10Gi
  podTemplate:
    topologySpreadConstraints:
      kubernetes.io/hostname:
        maxSkew: 1
        whenUnsatisfiable: DoNotSchedule
  promExporter:
    enabled: true
  podMonitor:
    enabled: false

# SurrealDB subchart configuration
surrealdb:
  enabled: true
  image:
    tag: "v2.3.7"
  # Storage backend configuration
  # For development/small deployments: use file-based storage with PVC
  # For production with TiKV: disable subchart and use external.tikvUrl
  surrealdb:
    # Configure this if using external TiKV cluster instead of embedded SurrealDB
    # Requires TiDB operator to be installed separately. See (https://surrealdb.com/docs/surrealdb/deployment/kubernetes)
    # path: "tikv://tikv-pd:2379"
    path: "surrealkv:/data/mir.db"  # File-based storage
    initial_user: "root"
    initial_pass: "root"
    log: info
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
      # - host: surreal-local
      #   paths:
      #     - path: /*
      #       pathType: Prefix
    tls: []
  # Volume configuration for persistent storage
  # IMPORTANT: When persistence is enabled, a PVC will be created with the name pattern:
  # {release-name}-surrealdb-data
  # You must use this exact name pattern in the volumes configuration
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: mir-surrealdb-data  # Update 'mir' to match your release name
  volumeMounts:
    - name: data
      mountPath: /data
