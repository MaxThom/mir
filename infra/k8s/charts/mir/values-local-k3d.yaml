image:
  tag: "cockpit__k8s--d3c88cb"

config:
  contexts:
    - name: "local"
      target: "nats://localhost:31422"
      webTarget: "ws://localhost:31922"
      grafana: "http://grafana-local:8081"
      sec:
        credentials: "/etc/mir/mir.creds"
        rootCA: ""
        tlsCert: ""
        tlsKey: ""
        password: "mir-operator"
    - name: "local-secret"
      target: "nats://localhost:31422"
      webTarget: "ws://localhost:31922"
      grafana: "http://grafana-local:8081"
      sec:
        credsSecretRef: "mir-auth-secret-local-cockpit"           # K8s secret name containing the .creds file
        credsSecretKey: "mir.creds"  # key inside the secret (default: mir.creds)
        rootCA: ""
        tlsCert: ""
        tlsKey: ""
        password: ""
    - name: "local-secret-wss"
      target: "nats://localhost:31422"
      webTarget: "wss://localhost:31922"
      grafana: "http://grafana-local:8081"
      sec:
        credsSecretRef: "mir-auth-secret-local-cockpit"           # K8s secret name containing the .creds file
        credsSecretKey: "mir.creds"  # key inside the secret (default: mir.creds)
        rootCA: ""
        tlsCert: ""
        tlsKey: ""
        password: ""
    - name: "local-ingress"
      target: "nats://localhost:31422"
      webTarget: "ws://mir-local:8081/nats-ws"
      grafana: "http://grafana-local:8081"
      sec:
        credsSecretRef: "mir-auth-secret-local-cockpit"           # K8s secret name containing the .creds file
        credsSecretKey: "mir.creds"  # key inside the secret (default: mir.creds)
    - name: "local-ingress-wss"
      target: "nats://localhost:31422"
      webTarget: "wss://mir-local:8081/nats-ws"
      grafana: "http://grafana-local:8081"
      sec:
        credsSecretRef: "mir-auth-secret-local-cockpit"           # K8s secret name containing the .creds file
        credsSecretKey: "mir.creds"  # key inside the secret (default: mir.creds)
  mir:
    logLevel: "debug"

service:
  type: NodePort

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: mir-local
      paths:
        - path: /
          pathType: Prefix

nats:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    host: nats-local
    path: /
    pathType: Prefix
  config:
    websocket:
      ingress:
        enabled: true
        hosts:
          - mir-local
        path: /nats-ws
        pathType: Prefix
        className: traefik
  promExporter:
    podMonitor:
      enabled: false

surrealdb:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    hosts:
      - host: surreal-local
        paths:
          - path: /
            pathType: Prefix
    tls: []

influxdb2:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    hostname: influx-local
    path: /
    tls: false

# Disable monitoring CRDs (ServiceMonitor/PodMonitor) when prometheus stack is off
mirServiceMonitors:
  enabled: false

mirPrometheusRules:
  enabled: false

# Enable Prometheus monitoring stack for k3d
kube-prometheus-stack:
  enabled: false

  prometheus:
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - prometheus-local
      paths:
        - /
      pathType: Prefix
    prometheusSpec:
      retention: 3d  # Shorter retention for local dev
      retentionSize: 5GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi  # Smaller storage for local
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

  grafana:
    enabled: true
    adminPassword: "mir-operator"
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - grafana-local
      path: /
      pathType: Prefix
    persistence:
      enabled: true
      size: 500Mi  # Smaller for local dev
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  alertmanager:
    enabled: true
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - alertmanager-local
      paths:
        - /
      pathType: Prefix
    alertmanagerSpec:
      retention: 48h  # Shorter retention for local
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 500Mi  # Smaller for local
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

  # Reduce resources for local development
  nodeExporter:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi

  kubeStateMetrics:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

loki:
  enabled: false
  persistence:
    enabled: true
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: "traefik"
    hosts:
      - loki-local

promtail:
  enabled: false
