image:
  tag: "feature__nkeys-infra--5cd7553"

config:
  mir:
    logLevel: "debug"

ingress:
  enabled: true
  className: "traefik"
  annotations: {}
  hosts:
    - host: mir-local
      paths:
        - path: /
          pathType: Prefix

nats:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    host: nats-local
    path: /
    pathType: Prefix
  service:
    merge:
      spec:
        type: LoadBalancer
        ports:
          - appProtocol: tcp
            name: nats
            nodePort: 31422
            port: 4222
            protocol: TCP
            targetPort: nats

surrealdb:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    hosts:
      - host: surreal-local
        paths:
          - path: /
            pathType: Prefix
    tls: []

influxdb2:
  enabled: true
  ingress:
    enabled: true
    className: "traefik"
    annotations: {}
    hostname: influx-local
    path: /
    tls: false

# Enable Prometheus monitoring stack for k3d
kube-prometheus-stack:
  enabled: false

  prometheus:
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - prometheus-local
      paths:
        - /
      pathType: Prefix
    prometheusSpec:
      retention: 3d  # Shorter retention for local dev
      retentionSize: 5GB
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi  # Smaller storage for local
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

  grafana:
    enabled: true
    adminPassword: "mir-operator"
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - grafana-local
      path: /
      pathType: Prefix
    persistence:
      enabled: true
      size: 500Mi  # Smaller for local dev
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

  alertmanager:
    enabled: true
    ingress:
      enabled: true
      className: "traefik"
      annotations: {}
      hosts:
        - alertmanager-local
      paths:
        - /
      pathType: Prefix
    alertmanagerSpec:
      retention: 48h  # Shorter retention for local
      storage:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 500Mi  # Smaller for local
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi

  # Reduce resources for local development
  nodeExporter:
    resources:
      requests:
        cpu: 25m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi

  kubeStateMetrics:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

loki:
  enabled: false
  persistence:
    enabled: true
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: "traefik"
    hosts:
      - loki-local

promtail:
  enabled: false
