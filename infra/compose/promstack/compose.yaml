services:
  grafana:
    image: grafana/grafana:latest
    network_mode: "host"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mir-operator
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_provisioning:/etc/grafana
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:latest
    network_mode: "host"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus_provisioning:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:latest
    network_mode: "host"
    ports:
      - "9093:9093"
    volumes:
      - alertmanager_data:/alertmanager
      - ./alertmanager_provisioning:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped
  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: unless-stopped
  loki:
    image: grafana/loki:latest
    network_mode: "host"
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki_provisioning:/etc/loki
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped
  promtail:
    image: grafana/promtail:latest
    network_mode: "host"
    ports:
      - "9080:9080"
    volumes:
      - ./promtail_provisioning:/etc/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yaml
    restart: unless-stopped

volumes:
  grafana_data:
  prometheus_data:
  alertmanager_data:
  loki_data:
