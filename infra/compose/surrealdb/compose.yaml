services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.5
    ports:
      - "8000:8000"
    volumes:
      - surrealdb_data:/var/lib/surrealdb
    user: root
    restart: unless-stopped
    command:
      - start
      - surrealkv:/var/lib/surrealdb/mydatabase.db
      - --user
      - root
      - --pass
      - root
      - -A
      - --log
      - debug

volumes:
  surrealdb_data:
