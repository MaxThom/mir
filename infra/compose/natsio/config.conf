# NATS Server Configuration
# Default configuration for Mir IoT Hub

server_name: "mir-nats"
listen: 0.0.0.0:4222
http_port: 8222

include resolver.conf

# Logging options
debug: false
trace: false
logtime: true

# Client connection limits
max_connections: 64000
max_control_line: 4096
max_payload: 8388608  # 8MB
max_pending: 67108864 # 64MB

# Performance tuning
write_deadline: "10s"
max_subscriptions: 0  # unlimited

# TLS/Security (disabled by default for local development)
# tls: {
#   cert_file: "/path/to/server-cert.pem"
#   key_file: "/path/to/server-key.pem"
#   ca_file: "/path/to/ca.pem"
#   verify: true
#   timeout: 2
# }

# JetStream configuration
jetstream: {
  store_dir: "/data/jetstream"

  # 1GB max memory storage
  max_memory_store: 1073741824

  # 10GB max file storage
  max_file_store: 10737418240
}

# WebSocket configuration (for browser clients)
websocket: {
  listen: 0.0.0.0:9222
  no_tls: true
  compress: true
}

# Ping interval
ping_interval: "2m"
ping_max: 2
