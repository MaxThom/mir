version: "3.8"
services:
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    environment:
      INFLUXDB_DB: mir
      INFLUXDB_ADMIN_USER: root
      INFLUXDB_ADMIN_PASSWORD: root
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: mir-operator
      DOCKER_INFLUXDB_INIT_ORG: Mir
      DOCKER_INFLUXDB_INIT_BUCKET: mir
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mir-operator-token

volumes:
  influxdb_data:
