# http://localhost:3000/api/datasources
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: mir-prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
  - name: alertmanager
    type: alertmanager
    uid: mir-alertmanager
    typeName: Alertmanager
    typeLogoUrl: public/app/plugins/datasource/alertmanager/img/logo.svg
    access: proxy
    url: http://localhost:9093
    basicAuth: false
    isDefault: false
    jsonData:
      handleGrafanaManagedAlerts: true
      implementation: prometheus
    readOnly: true
  - name: influxdb
    type: influxdb
    uid: mir-influxdb
    typeName: InfluxDB
    typeLogoUrl: public/app/plugins/datasource/influxdb/img/influxdb_logo.svg
    access: proxy
    url: http://localhost:8086
    user: ""
    database: ""
    basicAuth: false
    isDefault: false
    jsonData:
      defaultBucket: mir
      httpMode: POST
      organization: Mir
      timeout: -5
      version: Flux
    secureJsonData:
      # Token must be retrieve from influxdb
      token: mir-operator-token
    readOnly: false
  - name: Loki
    type: loki
    uid: mir-loki
    typeName: Loki
    access: proxy
    url: http://localhost:3100
    basicAuth: false
    isDefault: false
    jsonData:
      timeout: 60
      maxLines: 1000
    readOnly: false
