# http://localhost:3000/api/datasources
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: mir-prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
  # - name: QuestDB
  #   uid: mir-questdb
