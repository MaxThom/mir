# http://localhost:3000/api/datasources
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
  - name: QuestDB
    typeName: PostgreSQL
    type: grafana-postgresql-datasource
    typeLogoUrl: "/public/app/plugins/datasource/grafana-postgresql-datasource/img/postgresql_logo.svg"
    access: proxy
    url: localhost:8812
    user: admin
    database: ""
    secureJsonData:
      password: "quest"
    jsonData:
      connMaxLifetime: 14400
      database: qdb
      maxIdleConns: 100
      maxIdleConnsAuto: true
      maxOpenConns: 100
      postgresVersion: 1230
      sslmode: disable
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://localhost:8428
    isDefault: false
    jsonData:
      prometheusType: Prometheus
  - name: influxdb
    type: influxdb
    typeName: InfluxDB
    typeLogoUrl: public/app/plugins/datasource/influxdb/img/influxdb_logo.svg
    access: proxy
    url: http://localhost:8086
    user: ""
    database: ""
    basicAuth: false
    isDefault: false
    jsonData:
      defaultBucket: mir
      httpMode: POST
      organization: Mir
      timeout: -5
      version: Flux
    secureJsonData:
      # Token must be retrieve from influxdb
      token: "yEj8M_fq9UTvQ_L6eZPxkCmznWvUUzLPrMiSjRJTyGwi5fPKX0uTVR7WYEPtDn2mo3Pbq5dU8T6GsC-Izg1VoA=="
    readOnly: false
