  #   jsonData:
  #     prometheusType: Prometheus
  - name: influxdb
    type: influxdb
    uid: mir-influxdb
    typeName: InfluxDB
    typeLogoUrl: public/app/plugins/datasource/influxdb/img/influxdb_logo.svg
    access: proxy
    url: http://localhost:8086
    user: ""
    database: ""
    basicAuth: false
    isDefault: false
    jsonData:
      defaultBucket: mir
      httpMode: POST
      organization: Mir
      timeout: -5
      version: Flux
    secureJsonData:
      # Token must be retrieve from influxdb
      token: mir-operator-token
    readOnly: false
