
apiVersion: 1

providers:
  - name: 'default' # Name of the dashboard provider
    orgId: 1 # Organization ID (default is 1)
    folder: 'protoproxy' # The folder to import dashboards to; leave as an empty string for the General folder
    type: file
    disableDeletion: false # Set to true to prevent Grafana from deleting dashboards
    editable: true # Set to true to allow dashboard edits from the UI
    options:
      path: /etc/grafana/provisioning/dashboards # Path to the dashboard JSON files
